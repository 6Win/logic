<title>Logic — Painel</title>
<style>
  :root{
    --bg:#0a0a0c; --surface:#131317; --surface-2:#1b1b21; --line:#2a2a31;
    --text:#f5f5f7; --muted:#8b8b95; --muted-2:#5f5f68;
    --red:#e5323b; --red-soft:rgba(229,50,59,.14); --red-line:rgba(229,50,59,.45);
    --green:#37b24d; --yellow:#e0a400;
    --radius:16px; --maxw:1080px;
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:15px;line-height:1.55;
    -webkit-font-smoothing:antialiased;
    background-image:radial-gradient(900px 500px at 100% -10%,rgba(229,50,59,.08),transparent 60%)}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:32px 22px 64px}

  .top{display:flex;align-items:center;justify-content:space-between;padding-bottom:22px;
    border-bottom:1px solid var(--line);margin-bottom:26px}
  .brand{display:flex;align-items:center;gap:12px}
  .mark{width:34px;height:34px;border-radius:9px;background:var(--red);position:relative;
    box-shadow:0 6px 20px -6px var(--red)}
  .mark::before{content:"";position:absolute;width:13px;height:13px;border:2.5px solid #fff;
    border-radius:50%;clip-path:inset(0 0 45% 0);left:8px;top:9px}
  .mark::after{content:"";position:absolute;width:2.5px;height:9px;background:#fff;top:17px;left:15px;border-radius:2px}
  .brand h1{font-size:19px;letter-spacing:.02em;font-weight:700}
  .brand span{display:block;font-size:11px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;margin-top:1px}
  .top .meta{font-size:12px;color:var(--muted);text-align:right}
  .top .meta b{color:var(--text);font-weight:600}

  .tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--line);border-radius:12px;
    padding:5px;width:fit-content;margin-bottom:26px}
  .tab{border:0;background:transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:600;
    padding:8px 16px;border-radius:8px;cursor:pointer;transition:.18s}
  .tab:hover{color:var(--text)} .tab.active{background:var(--red);color:#fff}

  .panel{display:none;animation:fade .35s ease} .panel.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px}
  .stat .n{font-size:26px;font-weight:700;letter-spacing:-.02em} .stat .n .u{color:var(--red)}
  .stat .l{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .card{position:relative;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:20px;cursor:pointer;overflow:hidden;transition:transform .22s,border-color .22s,background .22s}
  .card:hover{transform:translateY(-4px);border-color:var(--red-line);background:var(--surface-2)}
  .card::after{content:"";position:absolute;inset:0;background:linear-gradient(150deg,var(--red-soft),transparent 55%);
    opacity:0;transition:opacity .25s} .card:hover::after{opacity:1}
  .card .cname{font-size:17px;font-weight:700;letter-spacing:-.01em}
  .card .cmeta{font-size:12px;color:var(--muted);margin-top:2px}
  .card .arrow{position:absolute;top:18px;right:18px;width:30px;height:30px;border-radius:50%;background:var(--red);
    display:flex;align-items:center;justify-content:center;opacity:0;transform:rotate(8deg) translateY(6px);transition:.28s}
  .card:hover .arrow{opacity:1;transform:rotate(0) translateY(0)} .card .arrow svg{width:14px;height:14px;stroke:#fff}
  .steps{display:flex;gap:7px;margin-top:16px;position:relative;z-index:2}
  .step{flex:1;display:flex;flex-direction:column;gap:6px;align-items:center}
  .step .bar{width:100%;height:4px;border-radius:3px;background:var(--surface-2);border:1px solid var(--line)}
  .step.done .bar{background:var(--red);border-color:var(--red)}
  .step .t{font-size:9.5px;color:var(--muted-2);text-transform:uppercase;letter-spacing:.06em}
  .step.done .t{color:var(--muted)}
  .gargalo{margin-top:16px;font-size:12.5px;color:var(--muted);position:relative;z-index:2;
    padding-left:12px;border-left:2px solid var(--red)}

  .cols{display:grid;grid-template-columns:340px 1fr;gap:16px;align-items:start}
  .block{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px}
  .block h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:14px}
  .cal-head{display:flex;align-items:baseline;gap:8px;margin-bottom:14px}
  .cal-head .m{font-size:16px;font-weight:700} .cal-head .y{font-size:13px;color:var(--muted)}
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .cal .dow{font-size:10px;color:var(--muted-2);text-align:center;font-weight:700;padding-bottom:6px}
  .cal .d{height:36px;display:flex;align-items:center;justify-content:center;font-size:12.5px;color:var(--muted);
    border-radius:9px;transition:.15s;opacity:0;animation:pop .3s ease forwards}
  @keyframes pop{from{opacity:0;transform:scale(.6)}to{opacity:1;transform:scale(1)}}
  .cal .d.act{background:var(--red-soft);color:var(--text);border:1px solid var(--red-line)}
  .cal .d.today{background:var(--red);color:#fff;font-weight:700;box-shadow:0 0 0 0 var(--red-line);animation:pop .3s ease forwards,pulse 2.2s ease-in-out infinite .4s}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(229,50,59,.5)}50%{box-shadow:0 0 0 6px rgba(229,50,59,0)}}
  .cal .d.empty{visibility:hidden;animation:none}
  .timeline .ev{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
  .timeline .ev:last-child{border-bottom:0}
  .timeline .dot{flex-shrink:0;width:9px;height:9px;border-radius:50%;background:var(--red);margin-top:6px}
  .timeline .ev .d{font-size:11px;color:var(--muted-2)} .timeline .ev .txt{font-size:13.5px}

  .video{aspect-ratio:16/9;background:var(--surface-2);border:1px dashed var(--line);border-radius:var(--radius);
    display:flex;align-items:center;justify-content:center;text-align:center;color:var(--muted);flex-direction:column;
    gap:8px;margin-bottom:16px;padding:24px}
  .video code{background:#000;color:var(--muted);padding:2px 7px;border-radius:6px;font-size:12px}
  .cmds{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
  .cmd{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
  .cmd .k{font-family:ui-monospace,monospace;font-size:13px;color:var(--red);font-weight:600}
  .cmd .v{font-size:12.5px;color:var(--muted);margin-top:4px}

  /* modal / dossiê */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);display:none;
    align-items:flex-start;justify-content:center;padding:40px 20px;z-index:50;overflow:auto}
  .overlay.open{display:flex;animation:fade .25s}
  .modal{background:var(--surface);border:1px solid var(--line);border-radius:20px;max-width:680px;width:100%;padding:26px}
  .modal .x{float:right;background:var(--surface-2);border:1px solid var(--line);color:var(--muted);width:32px;height:32px;
    border-radius:9px;cursor:pointer;font-size:16px} .modal .x:hover{color:var(--text);border-color:var(--red-line)}
  .modal h2{font-size:22px;letter-spacing:-.02em} .modal .sub{font-size:12.5px;color:var(--muted);margin-top:2px}
  .dtabs{display:flex;gap:4px;margin:18px 0;flex-wrap:wrap}
  .dtab{border:1px solid var(--line);background:var(--surface-2);color:var(--muted);font-family:inherit;font-size:12px;
    font-weight:600;padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s}
  .dtab:hover:not(:disabled){color:var(--text);border-color:var(--red-line)}
  .dtab.active{background:var(--red);color:#fff;border-color:var(--red)}
  .dtab:disabled{opacity:.35;cursor:not-allowed}
  .dbody{animation:fade .25s}
  .dsec{margin-bottom:18px} .dsec:last-child{margin-bottom:0}
  .dsec h4{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-bottom:8px}
  .insight{background:var(--red-soft);border:1px solid var(--red-line);border-radius:12px;padding:14px 16px;
    font-size:14px;line-height:1.5}
  .insight .lbl{font-size:10px;color:var(--red);text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:6px;display:block}
  .qbox{background:var(--surface-2);border:1px solid var(--line);border-radius:10px;padding:12px 14px;font-size:13.5px;line-height:1.5}
  .scores{display:flex;flex-direction:column;gap:9px}
  .score{display:grid;grid-template-columns:135px 1fr 30px;align-items:center;gap:10px;font-size:12.5px}
  .score .track{height:7px;background:var(--surface-2);border-radius:4px;overflow:hidden}
  .score .fill{height:100%;border-radius:4px;animation:grow .6s ease}
  @keyframes grow{from{width:0}}
  .score .val{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}
  ul.list{list-style:none;display:flex;flex-direction:column;gap:7px}
  ul.list li{font-size:13px;padding-left:16px;position:relative;color:var(--text)}
  ul.list li::before{content:"";position:absolute;left:0;top:8px;width:6px;height:6px;background:var(--red);border-radius:2px}
  table.arena{width:100%;border-collapse:collapse;font-size:12.5px}
  table.arena td,table.arena th{text-align:left;padding:8px 10px;border-bottom:1px solid var(--line);vertical-align:top}
  table.arena th{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
  table.arena td:first-child{font-weight:600;white-space:nowrap}
  .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .two .k{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px}
  .mov{background:var(--red);color:#fff;border-radius:10px;padding:12px 14px;font-size:13.5px;font-weight:600;line-height:1.4}
  .frente{border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:8px}
  .frente .fn{font-size:13px;font-weight:700;margin-bottom:7px;color:var(--red)}
  .mfoot{margin-top:18px;padding-top:14px;border-top:1px solid var(--line);display:flex;flex-wrap:wrap;gap:8px}
  .mfoot a{font-size:11.5px;color:var(--muted);text-decoration:none;background:var(--surface-2);border:1px solid var(--line);
    padding:6px 11px;border-radius:8px;transition:.15s} .mfoot a:hover{color:var(--red);border-color:var(--red-line)}
  .none{color:var(--muted);font-size:13px}

  footer{margin-top:34px;padding-top:18px;border-top:1px solid var(--line);font-size:12px;color:var(--muted-2);text-align:center}
  .empty{grid-column:1/-1;text-align:center;color:var(--muted);padding:48px;border:1px dashed var(--line);border-radius:var(--radius)}
  @media(max-width:720px){.stats{grid-template-columns:repeat(2,1fr)}.cols{grid-template-columns:1fr}.two{grid-template-columns:1fr}}
</style>

<div class="wrap">
  <div class="top">
    <div class="brand"><div class="mark"></div><div><h1>LOGIC</h1><span>Painel</span></div></div>
    <div class="meta">Inteligência rodando no Claude<br><b id="today"></b></div>
  </div>

  <div class="tabs">
    <button class="tab active" data-tab="clientes">Clientes</button>
    <button class="tab" data-tab="historico">Histórico</button>
    <button class="tab" data-tab="guia">Guia</button>
  </div>

  <section class="panel active" id="clientes">
    <div class="stats" id="stats"></div>
    <div class="grid" id="cards"></div>
  </section>

  <section class="panel" id="historico">
    <div class="cols">
      <div class="block">
        <div class="cal-head"><span class="m" id="calM"></span><span class="y" id="calY"></span></div>
        <div class="cal" id="cal"></div>
      </div>
      <div class="block"><h3>Linha do tempo</h3><div class="timeline" id="timeline"></div></div>
    </div>
  </section>

  <section class="panel" id="guia">
    <div class="block" style="margin-bottom:16px"><h3>Como usar o Logic</h3>
      <div class="video"><div>Espaço para o vídeo (3–5 min)</div><div>cole o embed do Loom aqui no <code>index.html</code></div></div>
    </div>
    <div class="cmds" id="cmds"></div>
  </section>

  <footer>Logic — roda no Claude, na sua máquina. Sem servidor, sem banco de dados.</footer>
</div>

<div class="overlay" id="overlay"><div class="modal" id="modal"></div></div>

<script>
/* ===== DADOS — o /painel regenera este bloco (não mexer no resto) ===== */
const DADOS = {
  clientes: [
    {
      slug:"chatuba", nome:"Chatuba Materiais de Construção",
      nicho:"Materiais de construção", cidade:"Rio de Janeiro/RJ",
      etapas:{diagnostico:true, pesquisa:true, plano:true, casos:false},
      gargalo:"Máquina de gerar demanda que vaza no fundo — a logística derruba o cliente profissional bem quando a Obramax entra no RJ.",
      diagnostico:{
        insight:"O único fosso da Chatuba contra a Leroy é a proximidade — entrega local confiável. E é justo esse fosso que está quebrado.",
        scores:[
          {k:"Oferta & Preço",v:6},{k:"Posicionamento",v:6},{k:"Aquisição",v:9},
          {k:"Conversão",v:6},{k:"Reputação/Retenção",v:5},{k:"Presença/Conteúdo",v:9}
        ],
        quickwins:[
          "Status proativo de entrega — ataca a causa-raiz de ~64% das reclamações",
          "Reverter reputação — 94,7% resolvidos viram prova social + cortar resposta de 5d15h",
          "Cravar posicionamento — de 'preço' para 'a rede da região que entrega certo'"
        ],
        arena:[
          {e:"Chatuba",f:"proximidade + relação local (62 anos, 224K)",fr:"logística de entrega"},
          {e:"Obramax",f:"preço de atacado pro profissional",fr:"presença regional"},
          {e:"Leroy",f:"escala nacional (R$8,97 bi)",fr:"atendimento e proximidade local"}
        ]
      },
      pesquisa:{
        perguntas:[
          {q:"O mercado cresce ou encolhe?",a:"Encolhendo em 2026 (juros, consumo fraco). Segura manutenção/reposição → reter > adquirir."},
          {q:"Quem está ganhando?",a:"Os atacarejos nacionais (Obramax R$400mi no RJ; Leroy R$8,97bi). Escala + preço."},
          {q:"Quem ameaça diretamente?",a:"Obramax (cerca o território + mira o profissional) e Asa Branca (entrega própria — ataca o ponto fraco)."},
          {q:"Oportunidade que ninguém explora?",a:"O cruzamento alcance digital + proximidade + entrega confiável está vago. A Chatuba é a única que teria os três."}
        ],
        janela:{agora:"crava 'entrega garantida' enquanto o espaço está aberto",
          esperar:"Obramax perto de 30 lojas, Asa Branca dona da 'entrega própria', Chatuba vira 'a rede grande com fama de entrega ruim'"},
        movimento:"Transformar entrega garantida em posicionamento de marca antes que a Asa Branca ocupe esse espaço."
      },
      plano:{
        aposta:"Transformar 'entrega confiável' na arma de retenção do profissional — blindar o fosso de proximidade antes da Obramax.",
        horizonte:"30 dias",
        frentes:[
          {n:"Visibilidade da entrega",a:["Nomear responsável pelo OTIF","SLA com a transportadora","Rotina diária de acompanhamento","Alerta automático de atraso + status no WhatsApp"]},
          {n:"Retenção da Liga",a:["Lista dos ~20 maiores profissionais","Responsável de relacionamento","Ligação pessoal com roteiro","Oferta de recuperação + CRM segmentado"]},
          {n:"Reputação = prova social",a:["Responsável com meta <24h no Reclame Aqui","Modelos de resposta","Pedir atualização de nota","Monitorar Google Reviews semanal"]}
        ]
      },
      casos:null
    }
  ],
  timeline:[{data:"2026-07-04", txt:"<b>Chatuba</b> — cliente criado + diagnóstico, pesquisa e plano"}],
  atividade:["2026-07-04"]
};
const CMDS=[
  {k:"/novo_cliente",v:"cadastra a empresa (só o nome é obrigatório)"},
  {k:"/diagnostico",v:"raio-X em 3 etapas — pare em qualquer uma"},
  {k:"/pesquisa",v:"concorrentes, mercado, oportunidade"},
  {k:"/plano",v:"transforma o diagnóstico em plano de ação"},
  {k:"/casos",v:"registra resultado e aprende"},
  {k:"/painel",v:"atualiza este dashboard"}
];
const ETAPAS=[["diagnostico","Diag"],["pesquisa","Pesq"],["plano","Plano"],["casos","Casos"]];

const $=s=>document.querySelector(s);
const meses=["janeiro","fevereiro","março","abril","maio","junho","julho","agosto","setembro","outubro","novembro","dezembro"];
const now=new Date();
$("#today").textContent=now.toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"});
const sc=v=>v<=3?"var(--red)":v<=6?"var(--yellow)":"var(--green)";

(function(){const c=DADOS.clientes,d=k=>c.filter(x=>x.etapas[k]).length;
  [["Clientes",c.length],["Diagnósticos",d("diagnostico")],["Planos",d("plano")],["Casos",d("casos")]]
  .forEach(([l,n])=>{$("#stats").insertAdjacentHTML("beforeend",`<div class="stat"><div class="n">${n}<span class="u">.</span></div><div class="l">${l}</div></div>`)});
})();

$("#cards").innerHTML=DADOS.clientes.length?DADOS.clientes.map(c=>`
  <div class="card" onclick="abrir('${c.slug}')">
    <div class="arrow"><svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 7L7 17M17 7H9M17 7V15"/></svg></div>
    <div class="cname">${c.nome}</div><div class="cmeta">${c.nicho} · ${c.cidade}</div>
    <div class="steps">${ETAPAS.map(([k,t])=>`<div class="step ${c.etapas[k]?'done':''}"><div class="bar"></div><div class="t">${t}</div></div>`).join("")}</div>
    <div class="gargalo">${c.gargalo}</div></div>`).join("")
  :`<div class="empty">Nenhum cliente ainda. Comece com <code>/novo_cliente</code> no Claude.</div>`;

(function(){const y=now.getFullYear(),m=now.getMonth();
  $("#calM").textContent=meses[m][0].toUpperCase()+meses[m].slice(1); $("#calY").textContent=y;
  const first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate();
  let h=["D","S","T","Q","Q","S","S"].map(d=>`<div class="dow">${d}</div>`).join("");
  for(let i=0;i<first;i++)h+=`<div class="d empty"></div>`;
  for(let d=1;d<=days;d++){const iso=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const t=d===now.getDate()?"today":DADOS.atividade.includes(iso)?"act":"";
    h+=`<div class="d ${t}" style="animation-delay:${(first+d)*14}ms">${d}</div>`;}
  $("#cal").innerHTML=h;
})();

$("#timeline").innerHTML=DADOS.timeline.length?DADOS.timeline.map(e=>{
  const d=new Date(e.data+"T00:00:00").toLocaleDateString("pt-BR",{day:"2-digit",month:"short"});
  return `<div class="ev"><div class="dot"></div><div><div class="d">${d}</div><div class="txt">${e.txt}</div></div></div>`;
}).join(""):`<div class="none">Sem atividade ainda.</div>`;

$("#cmds").innerHTML=CMDS.map(c=>`<div class="cmd"><div class="k">${c.k}</div><div class="v">${c.v}</div></div>`).join("");

document.querySelectorAll(".tab").forEach(t=>t.onclick=()=>{
  document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
  document.querySelectorAll(".panel").forEach(x=>x.classList.remove("active"));
  t.classList.add("active");$("#"+t.dataset.tab).classList.add("active");});

/* ===== dossiê do cliente ===== */
let CUR=null;
function abrir(slug){CUR=DADOS.clientes.find(x=>x.slug===slug);if(!CUR)return;
  const secs=[["diagnostico","Diagnóstico"],["pesquisa","Pesquisa"],["plano","Plano"],["casos","Casos"]];
  const first=secs.find(([k])=>CUR[k]);
  $("#modal").innerHTML=`<button class="x" onclick="fechar()">×</button>
    <h2>${CUR.nome}</h2><div class="sub">${CUR.nicho} · ${CUR.cidade}</div>
    <div class="dtabs">${secs.map(([k,l])=>`<button class="dtab" data-sec="${k}" ${CUR[k]?'':'disabled'}>${l}</button>`).join("")}</div>
    <div class="dbody" id="dbody"></div>
    <div class="mfoot">${["diagnostico","pesquisa","plano","casos"].filter(f=>CUR[f]).map(f=>`<a href="../clientes/${CUR.slug}/${f}.md" target="_blank">abrir ${f}.md</a>`).join("")}</div>`;
  $("#overlay").classList.add("open");
  if(first)sec(first[0]);
}
function sec(k){document.querySelectorAll(".dtab").forEach(b=>b.classList.toggle("active",b.dataset.sec===k));
  $("#dbody").innerHTML=({diagnostico:rDiag,pesquisa:rPesq,plano:rPlano,casos:rCasos}[k])(CUR);}
document.addEventListener("click",e=>{if(e.target.classList.contains("dtab")&&!e.target.disabled)sec(e.target.dataset.sec);});

function rDiag(c){const d=c.diagnostico;return `
  <div class="dsec"><div class="insight"><span class="lbl">Insight</span>${d.insight}</div></div>
  <div class="dsec"><h4>Painel /10</h4><div class="scores">${d.scores.map(s=>`<div class="score"><span>${s.k}</span><div class="track"><div class="fill" style="width:${s.v*10}%;background:${sc(s.v)}"></div></div><span class="val">${s.v}/10</span></div>`).join("")}</div></div>
  <div class="dsec"><h4>Quick wins</h4><ul class="list">${d.quickwins.map(q=>`<li>${q}</li>`).join("")}</ul></div>
  <div class="dsec"><h4>Arena competitiva</h4><table class="arena"><tr><th>Empresa</th><th>Força</th><th>Fraqueza</th></tr>${d.arena.map(a=>`<tr><td>${a.e}</td><td>${a.f}</td><td>${a.fr}</td></tr>`).join("")}</table></div>`;}
function rPesq(c){const p=c.pesquisa;return `
  <div class="dsec"><h4>As 4 perguntas</h4>${p.perguntas.map(x=>`<div class="qbox" style="margin-bottom:8px"><b>${x.q}</b><br><span style="color:var(--muted)">${x.a}</span></div>`).join("")}</div>
  <div class="dsec"><h4>Janela de oportunidade</h4><div class="two"><div class="qbox"><div class="k">Agir agora</div>${p.janela.agora}</div><div class="qbox"><div class="k">Esperar 12 meses</div>${p.janela.esperar}</div></div></div>
  <div class="dsec"><h4>Movimento antes do concorrente</h4><div class="mov">${p.movimento}</div></div>`;}
function rPlano(c){const p=c.plano;return `
  <div class="dsec"><div class="insight"><span class="lbl">Aposta · ${p.horizonte}</span>${p.aposta}</div></div>
  <div class="dsec"><h4>Frentes</h4>${p.frentes.map(f=>`<div class="frente"><div class="fn">${f.n}</div><ul class="list">${f.a.map(x=>`<li>${x}</li>`).join("")}</ul></div>`).join("")}</div>`;}
function rCasos(c){return c.casos?`<div class="dsec">${c.casos}</div>`:`<div class="none">Ainda sem resultado registrado. O <code>/casos</code> preenche aqui depois da execução.</div>`;}

function fechar(){$("#overlay").classList.remove("open");}
$("#overlay").onclick=e=>{if(e.target===$("#overlay"))fechar();};
document.onkeydown=e=>{if(e.key==="Escape")fechar();};
</script>
